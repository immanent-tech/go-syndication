<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627" role="img" aria-labelledby="sl-title sl-desc">
  <title id="sl-title">go-syndication — LinkedIn / Open Graph social preview</title>
  <desc id="sl-desc">Cream background with a large retro broadcast badge on the left and the go-syndication wordmark with tagline on the right.</desc>
  <defs>
    <style>
      .canvas { fill: #FDF3E1; }
      .bg { fill: #FDF3E1; }
      .border { fill: none; stroke: #3A2618; stroke-width: 9; }
      .ray { stroke: #F2A93B; stroke-width: 4; opacity: 0.5; }
      .arc-outer { fill: none; stroke: #2A6F77; stroke-width: 23; stroke-linecap: round; }
      .arc-inner { fill: none; stroke: #E85D25; stroke-width: 23; stroke-linecap: round; }
      .dot { fill: #F2A93B; stroke: #3A2618; stroke-width: 4; }
      .accent { fill: #00ADD8; stroke: #3A2618; stroke-width: 3.5; }
      .word-go { font-family: Georgia, 'Times New Roman', serif; font-weight: 700; font-style: italic; font-size: 88px; fill: #E85D25; }
      .word-rest { font-family: Georgia, 'Times New Roman', serif; font-weight: 700; font-style: italic; font-size: 88px; fill: #2A6F77; }
      .tagline { font-family: 'Courier New', monospace; font-size: 27px; letter-spacing: 5px; fill: #3A2618; }
      .footer { font-family: 'Courier New', monospace; font-size: 20px; letter-spacing: 1.5px; fill: #9c8b76; }
      .frame { fill: none; stroke: #3A2618; stroke-width: 3; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="627" class="canvas"/>

  <!-- faint oversized sunburst for texture, bleeding off the top-right corner -->
  <g transform="translate(1120,-30)" opacity="0.55">
    <g stroke="#F2A93B" stroke-width="5" opacity="0.4">
      <line x1="0" y1="-260" x2="0" y2="-210"/>
      <line x1="130" y1="-225" x2="108" y2="-187"/>
      <line x1="225" y1="-130" x2="187" y2="-108"/>
      <line x1="260" y1="0" x2="210" y2="0"/>
      <line x1="225" y1="130" x2="187" y2="108"/>
      <line x1="-130" y1="-225" x2="-108" y2="-187"/>
      <line x1="-225" y1="-130" x2="-187" y2="-108"/>
      <line x1="-260" y1="0" x2="-210" y2="0"/>
      <line x1="0" y1="260" x2="0" y2="210"/>
      <line x1="-130" y1="225" x2="-108" y2="187"/>
    </g>
  </g>

  <!-- thin vintage postcard-style inner frame -->
  <rect x="26" y="26" width="1148" height="575" rx="14" class="frame"/>

  <!-- icon badge, left side -->
  <g transform="translate(88,142) scale(2.35)">
    <rect x="0" y="0" width="144" height="144" rx="28" class="bg"/>
    <g transform="translate(72,72)">
      <g class="ray">
        <line x1="0" y1="-64" x2="0" y2="-53"/>
        <line x1="32" y1="-55.4" x2="26.6" y2="-46"/>
        <line x1="55.4" y1="-32" x2="46" y2="-26.6"/>
        <line x1="64" y1="0" x2="53" y2="0"/>
        <line x1="-32" y1="-55.4" x2="-26.6" y2="-46"/>
        <line x1="-55.4" y1="-32" x2="-46" y2="-26.6"/>
        <line x1="-64" y1="0" x2="-53" y2="0"/>
      </g>
    </g>
    <rect x="0" y="0" width="144" height="144" rx="28" class="border"/>
    <circle cx="52" cy="115" r="10.5" class="dot"/>
    <path d="M 52,83 A 32,32 0 0 1 84,115" class="arc-inner"/>
    <path d="M 52,54 A 61,61 0 0 1 113,115" class="arc-outer"/>
    <circle cx="118" cy="46" r="7.2" class="accent"/>
  </g>

  <!-- wordmark, right side -->
  <text x="466" y="312"><tspan class="word-go">go</tspan><tspan class="word-rest">-syndication</tspan></text>
  <text x="470" y="366" class="tagline">RSS · ATOM · JSONFEED</text>
  <text x="470" y="402" class="tagline">A GO LIBRARY FOR SYNDICATION FEEDS</text>

  <!-- footer credit line -->
  <text x="470" y="474" class="footer">github.com/immanent-tech/go-syndication</text>
</svg>
