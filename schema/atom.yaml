---
openapi: '3.1.0'
info:
  version: 1.0.0
  title: Atom
  description: >
    Atom OpenAPI schema.

    https://www.rfc-editor.org/rfc/rfc4287
  contact:
    name: 'Joshua Rich'
    email: joshua.rich@gmail.com
  license:
    identifier: MIT
components:
  schemas:
    Type:
      description: >
        represents what the content of the element is.
      type: string
      enum: ['text', 'html', 'xhtml']
      default: 'text'
      xml:
        attribute: true
      x-oapi-codegen-extra-tags:
        xml: 'type,attr,omitempty'
        json: 'type,omitempty'
        validate: 'omitempty,mimetype'
    CommonAttributes:
      description: >
        are common attributes across Atom elements.
      type: object
      properties:
        Base:
          description: >
            establishes the base URI (or IRI) for resolving any relative references found within the effective scope of
            the xml:base attribute.
          type: string
          xml:
            attribute: true
          x-oapi-codegen-extra-tags:
            xml: 'xml:base,attr,omitempty'
            json: 'base,omitempty'
            validate: 'omitempty'
        Lang:
          description: >
            indicates the natural language for the element and its descendents.
          type: string
          xml:
            attribute: true
          x-oapi-codegen-extra-tags:
            xml: 'xml:lang,attr,omitempty'
            json: 'lang,omitempty'
            validate: 'omitempty,iso3166_1_alpha2|iso3166_1_alpha3|bcp47_language_tag'
        attributes:
          description: >
            are any additional attributes of the element.
          type: array
          items:
            x-go-type: xml.Attr
          x-oapi-codegen-extra-tags:
            xml: ',any,attr'
            json: 'attributes'
          x-go-type-skip-optional-pointer: true
    UndefinedContent:
      description: >
        represents additional undefined, unstructed text content for the element.
      type: string
      x-oapi-codegen-extra-tags:
        xml: ',chardata'
        json: 'undefined_content,omitempty'
    TextConstruct:
      description: contains human-readable text, usually in small quantities.
      type: object
      allOf:
        - $ref: '#/components/schemas/CommonAttributes'
        - type: object
          required:
            - value
          properties:
            value:
              description: >
                is the value of the element for type=text/html.
              type: string
              x-oapi-codegen-extra-tags:
                validate: 'required_if=Type html|required_if=Type text'
            xhtml:
              description: >
                is the value of the element for type=xhtml
              type: string
              x-go-name: XHTML
              x-oapi-codegen-extra-tags:
                validate: 'required_if=Type xhtml'
            type:
              $ref: '#/components/schemas/Type'
    PersonConstruct:
      description: describes a person, corporation, or similar entity
      allOf:
        - $ref: '#/components/schemas/CommonAttributes'
        - type: object
          required:
            - name
          properties:
            name:
              description: is an element that conveys a human-readable name.
              type: string
              x-oapi-codegen-extra-tags:
                xml: 'name'
                json: 'name'
                validate: 'required'
            uri:
              description: >
                is an element that conveys an IRI (URI).
              type: string
              x-go-name: URI
              x-oapi-codegen-extra-tags:
                xml: 'uri,omitempty'
                json: 'uri,omitempty'
                validate: 'omitempty'
            email:
              description: >
                is an element that conveys an email address.
              type: string
              x-oapi-codegen-extra-tags:
                xml: 'email,omitempty'
                json: 'email,omitempty'
                validate: 'omitempty,email'
            Extensions:
              description: >
                records any elements that are unknown extensions to the schema.
              type: array
              items:
                $ref: 'types.yaml#/components/schemas/Extension'
              x-oapi-codegen-extra-tags:
                json: 'extensions,omitempty'
                xml: ',any'
              x-go-type-skip-optional-pointer: true
    DateConstruct:
      description: >
        is an element whose content MUST conform to the "date-time" production in [RFC3339].
      allOf:
        - $ref: '#/components/schemas/CommonAttributes'
        - type: object
          required:
            - value
          properties:
            value:
              description: is the value of the date construct.
              x-go-type: time.Time
      x-oapi-codegen-extra-tags:
        validate: 'validateFn'
    ID:
      description: >
        is an element that conveys a permanent, universally unique identifier for an entry or feed.
      allOf:
        - $ref: '#/components/schemas/CommonAttributes'
        - type: object
          required:
            - value
          properties:
            value:
              description: >
                is the value of the ID
              type: string
              x-oapi-codegen-extra-tags:
                xml: ',chardata'
      x-go-name: ID
      x-oapi-codegen-extra-tags:
        xml: 'id'
        json: 'id'
        validate: 'required'
    Title:
      description: >
        is an element of type Text construct that conveys a human-readable title for an entry or feed.
      x-go-type: TextConstruct
      x-oapi-codegen-extra-tags:
        xml: 'title'
        json: 'title'
        validate: 'required'
    Updated:
      description: >
        is an element of type Date construct indicating the most recent instant in time when an entry or feed was modified in a
        way the publisher considers significant.
      x-go-type: DateConstruct
      x-oapi-codegen-extra-tags:
        xml: 'updated'
        json: 'updated'
        validate: 'required'
    Category:
      description: >
        is an element that conveys information about a category associated with an entry or feed.
      allOf:
        - $ref: '#/components/schemas/CommonAttributes'
        - type: object
          required:
            - term
          properties:
            extensions:
              description: >
                represents any additional, undefined content for this element.
              type: array
              items:
                $ref: 'types.yaml#/components/schemas/Extension'
              x-go-type-skip-optional-pointer: true
              x-oapi-codegen-extra-tags:
                json: 'extensions,omitempty'
                xml: ',any'
            term:
              description: >
                is a string that identifies the category to which the entry or feed belongs.
              x-go-type: xml.Attr
              xml:
                attribute: true
              x-oapi-codegen-extra-tags:
                xml: 'term,attr'
                json: 'term'
                validate: 'required'
            scheme:
              description: >
                is an IRI that identifies a categorization scheme.
              x-go-type: xml.Attr
              xml:
                attribute: true
              x-oapi-codegen-extra-tags:
                xml: 'scheme,attr,omitempty'
                json: 'scheme,omitempty'
            label:
              description: >
                provides a human-readable label for display in end-user applications.
              x-go-type: xml.Attr
              xml:
                attribute: true
              x-oapi-codegen-extra-tags:
                xml: 'label,attr,omitempty'
                json: 'label,omitempty'
      x-oapi-codegen-extra-tags:
        xml: 'category,omitempty'
        json: 'category,omitempty'
    Categories:
      description: >
        a list of categories associated with the feed.
      type: array
      items:
        $ref: '#/components/schemas/Category'
      x-oapi-codegen-extra-tags:
        xml: 'category,omitempty'
        validate: 'dive'
      x-go-type-skip-optional-pointer: true
    Generator:
      description: >
        is an element identifies the agent used to generate a feed.
      allOf:
        - $ref: '#/components/schemas/CommonAttributes'
        - type: object
          required:
            - value
          properties:
            value:
              description: >
                is the element value.
              type: string
              x-oapi-codegen-extra-tags:
                xml: ',chardata'
            uri:
              type: string
              x-go-name: URI
              xml:
                attribute: true
              x-oapi-codegen-extra-tags:
                xml: 'uri,attr,omitempty'
                json: 'uri,omitempty'
                validate: 'omitempty,url'
            version:
              type: string
              xml:
                attribute: true
              x-oapi-codegen-extra-tags:
                xml: 'version,attr,omitempty'
                json: 'version,omitempty'
      x-oapi-codegen-extra-tags:
        xml: 'generator,omitempty'
        json: 'generator,omitempty'
    Icon:
      description: >
        is an element that contains a URI to an icon suitable for representing a feed.
      allOf:
        - $ref: '#/components/schemas/CommonAttributes'
        - type: object
          required:
            - value
          properties:
            value:
              description: is the value as a valid IRI.
              type: string
              x-oapi-codegen-extra-tags:
                xml: ',chardata'
      x-oapi-codegen-extra-tags:
        xml: 'icon,omitempty'
        json: 'icon,omitempty'
    Link:
      description: >
        defines a relationship between a web resource (such as a page) and an RSS channel or item.
      allOf:
        - $ref: '#/components/schemas/CommonAttributes'
        - type: object
          required:
            - href
          properties:
            href:
              description: >
                contains the URL of the related resource.
              type: string
              xml:
                attribute: true
              x-oapi-codegen-extra-tags:
                xml: 'href,attr'
                validate: 'required,url|hostname'
            hreflang:
              description: >
                identifies the language used by the related resource using an HTML language code.
              type: string
              x-go-name: HrefLang
              xml:
                attribute: true
              x-oapi-codegen-extra-tags:
                xml: 'hreflang,attr,omitempty'
                validate: 'omitempty,rfc3066lang'
            length:
              description: >
                contains the resource's size, in bytes.
              type: integer
              xml:
                attribute: true
              x-oapi-codegen-extra-tags:
                xml: 'length,attr,omitempty'
                validate: 'omitempty,number'
            title:
              description: >
                provides a human-readable description of the resource.
              type: string
              xml:
                attribute: true
              x-oapi-codegen-extra-tags:
                xml: 'title,attr,omitempty'
            type:
              description: >
                identifies the resource's MIME media type.
              type: string
              xml:
                attribute: true
              x-oapi-codegen-extra-tags:
                xml: 'type,attr,omitempty'
                validate: 'omitempty,mimetype'
            rel:
              description: >
                contains a keyword that identifies the nature of the relationship between the linked resouce and the
                element.
              type: string
              enum:
                [
                  'alternate',
                  'enclosure',
                  'related',
                  'self',
                  'via',
                  'hub',
                  'edit',
                  'next',
                  'standout',
                  'http://schemas.google.com/g/2005#feed',
                ]
              xml:
                attribute: true
              x-go-type-skip-optional-pointer: true
              x-oapi-codegen-extra-tags:
                xml: 'rel,attr,omitempty'
                validate: 'omitempty,oneof=alternate enclosure related self via hub edit next standout http://schemas.google.com/g/2005#feed'
            UndefinedContent:
              $ref: '#/components/schemas/UndefinedContent'
      x-oapi-codegen-extra-tags:
        xml: 'http://www.w3.org/2005/Atom link,omitempty'
        json: 'link,omitempty'
        validate: 'validateFn'
    Links:
      description: >
        a list of links associated with the feed.
      type: array
      items:
        $ref: '#/components/schemas/Link'
      x-oapi-codegen-extra-tags:
        xml: 'link,omitempty'
        validate: 'dive'
      x-go-type-skip-optional-pointer: true
    Logo:
      description: >
        is an element that contains a URI to an logo suitable for representing a feed.
      allOf:
        - $ref: '#/components/schemas/CommonAttributes'
        - type: object
          required:
            - value
          properties:
            value:
              type: string
              x-oapi-codegen-extra-tags:
                json: 'value'
                xml: ',chardata'
      x-oapi-codegen-extra-tags:
        xml: 'logo,omitempty'
        json: 'logo,omitempty'
        validate: 'omitempty'
    Rights:
      description: >
        is an element of type Text construct that conveys information about rights held in and over an entry or feed.
      x-go-type: TextConstruct
      x-oapi-codegen-extra-tags:
        xml: 'rights,omitempty'
        json: 'rights,omitempty'
    Published:
      description: >
        is an element of type Date construct indicating an instant in time associated with an event early in the life
        cycle of the entry.
      x-go-type: DateConstruct
      x-oapi-codegen-extra-tags:
        xml: 'published,omitempty'
        json: 'published,omitempty'
    Subtitle:
      description: >
        is an element of type Text construct that conveys a human-readable subtitle for an entry or feed.
      x-go-type: TextConstruct
      x-oapi-codegen-extra-tags:
        xml: 'subtitle,omitempty'
        json: 'subtitle,omitempty'
    Summary:
      description: >
        is an element of type Text construct that conveys a short summary, abstract, or excerpt of an entry.
      x-go-type: TextConstruct
      x-oapi-codegen-extra-tags:
        xml: 'summary,omitempty'
        json: 'summary,omitempty'
    Content:
      description: >
        either contains or links to the content of the entry.
      allOf:
        - $ref: '#/components/schemas/CommonAttributes'
        - type: object
          properties:
            type:
              $ref: '#/components/schemas/Type'
            src:
              description: >
                is an attribute that links to the source content.
              type: string
              x-go-name: Source
              xml:
                attribute: true
              x-oapi-codegen-extra-tags:
                xml: 'src,attr,omitempty'
                json: 'src,omitempty'
                validate: 'omitempty,required_without=Value,uri'
            text:
              description: >
                contains the value when Type is "text"/"html", or a "text/*" MIME type.
              type: string
            XHTML:
              description: >
                contains the value when Type == "xhtml": inner markup of the <div>.
              type: string
              x-go-name: XHTML
            XML:
              description: >
                contains the value when Type ends in "+xml" or "/xml" (and isn't "text/..."): embedded XML, raw.
              type: string
              x-go-name: XML
            Base64:
              description: >
                contains the value when any other MIME type: out-of-band binary content.
              x-go-type: '[]byte'
              x-go-type-skip-optional-pointer: true
      x-oapi-codegen-extra-tags:
        xml: 'content,omitempty'
        json: 'content,omitempty'
    Contributors:
      description: >
        a list of persons who contributed to the feed.
      type: array
      items:
        $ref: '#/components/schemas/PersonConstruct'
      x-oapi-codegen-extra-tags:
        xml: 'contributor,omitempty'
        validate: 'omitempty,gt=0,dive'
      x-go-type-skip-optional-pointer: true
    Authors:
      description: >
        a list of persons who maintain authorship of the feed.
      type: array
      items:
        $ref: '#/components/schemas/PersonConstruct'
      x-oapi-codegen-extra-tags:
        xml: 'author,omitempty'
        validate: 'omitempty,gt=0,dive'
      x-go-type-skip-optional-pointer: true
    FeedMetadata:
      description: >
        is the feed metadata.
      allOf:
        - $ref: '#/components/schemas/CommonAttributes'
        - type: object
          required:
            - XMLName
            - ID
            - title
            - updated
          properties:
            ID:
              $ref: '#/components/schemas/ID'
            title:
              $ref: '#/components/schemas/Title'
            published:
              $ref: '#/components/schemas/Published'
            updated:
              $ref: '#/components/schemas/Updated'
            authors:
              $ref: '#/components/schemas/Authors'
            categories:
              $ref: '#/components/schemas/Categories'
            contributors:
              $ref: '#/components/schemas/Contributors'
            generator:
              $ref: '#/components/schemas/Generator'
            icon:
              $ref: '#/components/schemas/Icon'
            links:
              $ref: '#/components/schemas/Links'
            logo:
              $ref: '#/components/schemas/Logo'
            rights:
              $ref: '#/components/schemas/Rights'
            subtitle:
              $ref: '#/components/schemas/Subtitle'
    Feed:
      description: >
        is the document (i.e., top-level) element of an Atom Feed Document, acting as a container for metadata and data
        associated with the feed.
      allOf:
        - $ref: 'media-rss.yaml#/components/schemas/MediaMetadata'
        - $ref: 'dc.yaml#/components/schemas/DCElements'
        - $ref: '#/components/schemas/FeedMetadata'
        - type: object
          properties:
            DefaultNamespace:
              type: string
              x-oapi-codegen-extra-tags:
                xml: '-'
            namespaces:
              description: >
                contains all namespaces in use by this RSS feed.
              type: array
              items:
                $ref: 'extensions.yaml#/components/schemas/Namespace'
              x-go-type-skip-optional-pointer: true
              x-oapi-codegen-extra-tags:
                xml: '-'
            entries:
              description: >
                is the list of <entry> elements for the feed.
              type: array
              items:
                $ref: '#/components/schemas/Entry'
              x-oapi-codegen-extra-tags:
                xml: 'entry,omitempty'
                json: 'entry,omitempty'
                validate: 'dive'
              x-go-type-skip-optional-pointer: true
            Extensions:
              description: >
                represents any additional, undefined content for this element.
              type: array
              items:
                $ref: 'types.yaml#/components/schemas/Extension'
              x-go-type-skip-optional-pointer: true
              x-oapi-codegen-extra-tags:
                json: 'extensions,omitempty'
                xml: ',any'
      x-oapi-codegen-extra-tags:
        json: 'feed'
        validate: 'validateFn'
    Source:
      description: >
        contains the metadata from the source feed for the entry.
      allOf:
        - $ref: '#/components/schemas/FeedMetadata'
      x-oapi-codegen-extra-tags:
        json: 'source,omitempty'
        validate: 'omitempty'
    Entry:
      description: >
        represents an individual entry, acting as a container for metadata and data associated with the entry.
      type: object
      allOf:
        - $ref: 'media-rss.yaml#/components/schemas/MediaMetadata'
        - $ref: 'dc.yaml#/components/schemas/DCElements'
        - $ref: '#/components/schemas/CommonAttributes'
        - type: object
          required:
            - ID
            - title
            - updated
          properties:
            ID:
              $ref: '#/components/schemas/ID'
            title:
              $ref: '#/components/schemas/Title'
            updated:
              $ref: '#/components/schemas/Updated'
            authors:
              $ref: '#/components/schemas/Authors'
            categories:
              $ref: '#/components/schemas/Categories'
            content:
              $ref: '#/components/schemas/Content'
            contributors:
              $ref: '#/components/schemas/Contributors'
            links:
              $ref: '#/components/schemas/Links'
            published:
              $ref: '#/components/schemas/Published'
            rights:
              $ref: '#/components/schemas/Rights'
            source:
              $ref: '#/components/schemas/Source'
            summary:
              $ref: '#/components/schemas/Summary'
            MediaGroup:
              $ref: 'media-rss.yaml#/components/schemas/MediaGroup'
            Extensions:
              description: >
                records any elements that are unknown extensions to the schema.
              type: array
              items:
                $ref: 'types.yaml#/components/schemas/Extension'
              x-oapi-codegen-extra-tags:
                json: 'extensions,omitempty'
                xml: ',any'
              x-go-type-skip-optional-pointer: true
      x-oapi-codegen-extra-tags:
        xml: 'entry'
        json: 'entry'
        validate: 'validateFn'
    StandaloneEntry:
      description: >
        is a document whose root element is atom:entry rather than atom:feed. Kept as a distinct wrapper rather than
        giving Entry itself a namespace-declaring MarshalXML, so the common case (Entry nested inside Feed.Entries)
        stays simple and un-verbose.
      type: object
      allOf:
        - $ref: '#/components/schemas/Entry'
        - type: object
          properties:
            DefaultNamespace:
              type: string
              x-oapi-codegen-extra-tags:
                xml: '-'
            namespaces:
              description: >
                contains all namespaces in use by this RSS feed.
              type: array
              items:
                $ref: 'extensions.yaml#/components/schemas/Namespace'
              x-go-type-skip-optional-pointer: true
              x-oapi-codegen-extra-tags:
                xml: '-'
