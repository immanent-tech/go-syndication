---
openapi: '3.0.3'
info:
  version: 1.0.0
  title: Common Types
  description: >
    Common/shared types across schemas.
  contact:
    name: 'Joshua Rich'
    email: joshua.rich@gmail.com
  license:
    identifier: AGPL-3.0-or-later
components:
  schemas:
    Timestamp:
      description: >
        represents a timestamp used in feed objects.
      type: object
      required:
        - value
      properties:
        value:
          description: is the timestamp value.
          x-go-type: time.Time
    SanitisedString:
      description: >
        represents a string that has sanitisation applied.
      type: object
      required:
        - value
      properties:
        value:
          description: is the sanitised string value.
          type: string
    Attributes:
      description: >
        are any attributes of the element.
      type: array
      items:
        x-go-type: xml.Attr
      x-oapi-codegen-extra-tags:
        xml: ',any,attr'
        json: 'attributes'
      x-go-type-skip-optional-pointer: true
    Extension:
      description: >
        represents an element that is not defined in the schema.
      type: object
      required:
        - XMLName
        - content
      properties:
        XMLName:
          description: represents the XML namespace of an element.
          x-go-type: 'xml.Name'
          x-oapi-codegen-extra-tags:
            json: 'xml'
            validate: 'required'
        content:
          description: is the element value.
          type: string
          x-oapi-codegen-extra-tags:
            xml: ',innerxml'
            validate: 'required'
        attributes:
          $ref: '#/components/schemas/Attributes'
    Extensions:
      description: >
        records any elements that are unknown extensions to the schema.
      type: array
      items:
        $ref: '#/components/schemas/Extension'
      x-oapi-codegen-extra-tags:
        json: 'extensions,omitempty'
        xml: ',any'
      x-go-type-skip-optional-pointer: true
    ImageInfo:
      description: >
        is an abstraction of an Image across different types of specifications.
      type: object
      required:
        - url
      properties:
        title:
          description: >
            the description of the image
          type: string
        url:
          description: >
            is the URL to the image.
          type: string
          x-go-name: URL
          x-oapi-codegen-extra-tags:
            xml: ',chardata'
            validate: 'required,url'
      x-oapi-codegen-extra-tags:
        validate: 'omitempty'
    SourceType:
      description: >
        is the type of source the feed or object came from. This can be used with abstractions that generalize different
        feed types into a common format to preserve information on the original.
      type: string
      enum: ['HTML', 'RSS', 'Atom', 'JSONFeed', 'RDF', 'Unknown']
      x-oapi-codegen-extra-tags:
        validate: 'oneof=HTML RSS Atom JSONFeed RDF Unknown'
    Namespace:
      description: >
        is a single xmlns:prefix="uri" declaration.
      type: object
      required:
        - prefix
        - uri
      properties:
        prefix:
          description: the unique prefix of the namespace.
          type: string
        uri:
          description: the URI that points to the namespace.
          type: string
          x-go-name: URI
